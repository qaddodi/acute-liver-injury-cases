<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interpreting the Liver Panel - Interactive Case Deck</title>
<link rel="preload" as="image" href="title.jpg" fetchpriority="high" />
<style>
:root{--ink:#1d1b19;--muted:#463f34;--faint:#736d63;--paper:#f9f7f1;--line:#d8d0c2;--chapter:#4b4a78;--red:#a84545;--green:#3e7954;--gold:#ae8845}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{background:#bbb5aa;color:var(--ink);font-family:Georgia,"Times New Roman",Times,serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.app{height:100dvh;width:100vw;background:#e9e3d7;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:59px;flex:0 0 59px;background:#fff;border-bottom:1px solid #dad6ce;display:flex;align-items:center;padding:0 28px;letter-spacing:.16em;text-transform:uppercase;position:relative;z-index:5}
.case-title{font-size:19px;white-space:nowrap}.act-tag{margin-left:18px;padding-left:18px;border-left:1px solid #dfdbd2;color:#6f685f;font-size:12px}.close{margin-left:auto;border:0;background:transparent;font-size:25px;cursor:pointer;color:#111;width:36px;height:36px}
.stage{position:relative;flex:1 1 auto;min-height:0;overflow:hidden;background:var(--bg,linear-gradient(120deg,#e8e1d3,#d5d1c8))}
.bg-layer{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat;opacity:0;filter:saturate(1.12) contrast(1.04) blur(0px) brightness(1);transition:opacity .36s cubic-bezier(.22,.61,.36,1),filter .36s cubic-bezier(.22,.61,.36,1);pointer-events:none;will-change:opacity,filter}
.bg-layer.is-active{opacity:1}
.stage:before{content:"";position:absolute;inset:0;z-index:1;pointer-events:none}
.stage.scrim-right:before{background:linear-gradient(270deg,rgba(249,247,241,.72),rgba(249,247,241,.46) 28%,rgba(249,247,241,.14) 52%,rgba(249,247,241,0) 68%)}
.stage.scrim-left:before{background:linear-gradient(90deg,rgba(249,247,241,.72),rgba(249,247,241,.46) 28%,rgba(249,247,241,.14) 52%,rgba(249,247,241,0) 68%)}
.stage.scrim-center:before{background:radial-gradient(72% 84% at 50% 50%,rgba(249,247,241,.58),rgba(249,247,241,.16) 56%,rgba(249,247,241,0) 76%)}

.slide{position:absolute;inset:0;z-index:2;display:flex;align-items:flex-start;justify-content:flex-start;padding:44px clamp(34px,5vw,88px) 32px;overflow-y:auto;opacity:0;transform:translate3d(0,10px,0);transition:opacity .32s cubic-bezier(.22,.61,.36,1),transform .32s cubic-bezier(.22,.61,.36,1)}
.slide.is-visible{opacity:1;transform:none}.slide.enter-next{transform:translate3d(20px,0,0)}.slide.enter-prev{transform:translate3d(-20px,0,0)}.slide.enter-next.is-visible,.slide.enter-prev.is-visible{transform:none}.slide.leaving-next{opacity:0;transform:translate3d(-20px,0,0);pointer-events:none;transition-duration:.2s}.slide.leaving-prev{opacity:0;transform:translate3d(20px,0,0);pointer-events:none;transition-duration:.2s}
.slide.right{justify-content:flex-end}.slide.center{justify-content:center;align-items:center;text-align:center}.title-slide{align-items:center}.title-slide.right{justify-content:flex-end}
.stack{width:min(760px,100%);max-width:760px}.stack.wide{width:min(900px,100%);max-width:900px}.case-stack{width:min(1080px,100%);max-width:1080px}.slide.right .stack,.slide.right .case-stack{margin-left:auto}
.slide.right{padding-right:clamp(20px,3vw,44px)}
.slide.center .stack,.slide.center .stack.wide{width:min(660px,100%);max-width:660px}
.slide.right .stack,.slide.right .stack.wide{width:min(720px,100%);max-width:720px}
.kicker,.titlebox,.panel,.case-grid,.section-title,.section-sub,.byline,.hint,.sub{text-shadow:0 1px 0 rgba(255,255,255,.82),0 0 12px rgba(250,248,241,.88),0 0 26px rgba(250,248,241,.66),0 0 46px rgba(250,248,241,.5)}
.kicker{color:var(--chapter);font-weight:bold;letter-spacing:.20em;text-transform:uppercase;font-size:13.5px;margin:0 0 8px 1px}
h1.section,.section-title{color:var(--chapter);font-weight:normal;font-size:clamp(2.7rem,5vw,4.15rem);line-height:1;margin:0 0 18px}.section-title{font-size:clamp(3.2rem,6vw,5rem)}
.titlebox{max-width:min(680px,100%);overflow-wrap:break-word}.titlebox h1{font-size:clamp(3.4rem,7vw,6rem);line-height:.96;color:#34345e;font-weight:normal;margin:0 0 18px;overflow-wrap:break-word;word-break:normal;hyphens:none}.titlebox .sub,.section-sub{font-size:24px;line-height:1.52;color:var(--muted);max-width:760px}.byline{margin:24px 0 0;color:#777166;font-size:16px;font-style:italic}.social{display:inline-block;margin-top:7px;color:#4b4a78;font-size:15px;text-decoration:none;letter-spacing:.03em}.social:hover{text-decoration:underline}.hint{margin-top:28px;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#557b8d;font-weight:bold}
h1.section,.section-title,.titlebox h1{text-shadow:0 1px 0 rgba(255,255,255,.95),0 0 12px rgba(249,247,241,.96),0 0 30px rgba(249,247,241,.86),0 0 58px rgba(249,247,241,.72)}
@supports (color:color-mix(in srgb, red, white)){h1.section,.section-title,.titlebox h1{text-shadow:0 1px 0 rgba(255,255,255,.96),0 0 12px rgba(249,247,241,.96),0 0 26px color-mix(in srgb,var(--chapter) 22%,transparent),0 0 56px color-mix(in srgb,var(--chapter) 16%,rgba(249,247,241,.72))}}
.panel{background:transparent;border:0;padding:0}.panel p{font-size:1.28rem;line-height:1.5;margin:0 0 15px}.panel .lead{font-size:1.44rem;line-height:1.46}.soft{color:var(--muted);font-style:italic}ul{margin:0 0 8px 24px;padding:0}li{font-size:1.19rem;line-height:1.45;margin:0 0 8px}.callout{margin-top:16px;padding:4px 0 4px 15px;border-left:3px solid var(--chapter)}.callout span{display:block;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--chapter);font-weight:bold;margin-bottom:5px}.callout p{font-size:1.125rem;margin:0;line-height:1.42}
.tablewrap{display:block;position:relative;width:fit-content;max-width:100%;margin:16px auto 18px;border-radius:16px;overflow:hidden;background:rgba(249,247,241,.20);background-clip:padding-box;border:1px solid rgba(93,83,68,.30);backdrop-filter:blur(36px) saturate(1.2);-webkit-backdrop-filter:blur(36px) saturate(1.2)}
.compare{position:relative;z-index:1;border-collapse:collapse;background:transparent;min-width:min(720px,100%);margin:0}.compare th,.compare td{border:1px solid rgba(93,83,68,.15);padding:16px 36px;font-size:1.3rem;text-align:center}.compare th{color:#34345e;background:rgba(255,255,255,.30)}
.case-grid{display:grid;grid-template-columns:minmax(380px,480px) minmax(280px,1fr);gap:28px;align-items:start}.labwrap{position:relative;border-radius:16px;overflow:hidden;background:rgba(249,247,241,.20);background-clip:padding-box;border:1px solid rgba(93,83,68,.30);backdrop-filter:blur(36px) saturate(1.2);-webkit-backdrop-filter:blur(36px) saturate(1.2)}.labtable{position:relative;z-index:1;width:100%;border-collapse:collapse;background:transparent}.labtable td{border:1px solid rgba(93,83,68,.15);padding:11px 16px;font-size:1.42rem;text-align:center}.labtable td:last-child{font-variant-numeric:tabular-nums}.labtable tr.clue td{font-weight:bold;color:#111;background:rgba(255,255,255,.58)}.labcaption{font-size:16px;letter-spacing:.16em;text-transform:uppercase;color:#6f685f;margin:0 0 11px;font-weight:bold}
.qstem{font-size:1.5rem;line-height:1.42;margin:0 0 16px}.answer{margin-top:16px;padding-top:15px;border-top:1px solid rgba(93,83,68,.22);animation:appear .32s}.answer .tag{display:inline-block;background:#34345e;color:#fff;border-radius:99px;padding:4px 11px;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;font-weight:bold}.answer h2{font-size:32px;color:#34345e;line-height:1.08;margin:0 0 12px;font-weight:normal}
.reveal-btn{border:1px solid var(--chapter);background:rgba(255,255,255,.55);color:var(--chapter);font-family:inherit;font-size:14px;font-weight:bold;letter-spacing:.14em;text-transform:uppercase;padding:11px 22px;cursor:pointer;border-radius:2px;box-shadow:0 1px 2px rgba(52,52,94,.10);transition:background .18s ease,color .18s ease,box-shadow .18s ease,transform .12s ease}.reveal-btn:hover{background:var(--chapter);color:#fff;box-shadow:0 4px 14px rgba(52,52,94,.22);transform:translateY(-1px)}.reveal-btn:active{transform:translateY(0)}.reveal-btn:before{content:"\25B8";margin-right:9px;font-size:12px;opacity:.85}
.nav{height:62px;flex:0 0 62px;background:#fff;border-top:1px solid #dad6ce;display:flex;align-items:center;gap:16px;padding:10px 22px}.navbtn{font-family:Georgia,"Times New Roman",Times,serif;background:#fff;border:1px solid #d4cec2;color:#34322f;text-transform:uppercase;letter-spacing:.12em;font-weight:bold;font-size:13px;padding:9px 18px;cursor:pointer;border-radius:3px;transition:background .15s ease,border-color .15s ease}.navbtn:hover:not(:disabled){background:#f8f5ee;border-color:#c8c1b3}.navbtn:disabled{opacity:.38;cursor:default}#reset{border-color:transparent;background:transparent;color:#928b81;padding:9px 10px}#reset:hover:not(:disabled){background:#f2eee6;color:#4a463f}.nav .divider{width:1px;height:24px;background:#e6e1d8;flex:0 0 auto}.progress{display:flex;align-items:center;gap:4px;min-width:0;flex:1 1 auto;height:22px}.seg{position:relative;height:8px;flex:1 1 0;min-width:7px;background:var(--segcol,#d3cbbd);opacity:.42;border-radius:4px;cursor:pointer;box-shadow:0 0 0 1px rgba(78,72,64,.16);transition:opacity .18s ease,height .18s ease}.seg:before{content:"";position:absolute;left:-4px;right:-4px;top:-9px;bottom:-9px}.seg.done{opacity:.92}.seg.current{opacity:1;height:16px;box-shadow:0 0 0 2px rgba(255,255,255,.95),0 1px 5px rgba(0,0,0,.3)}.seg:hover{opacity:1}.seg.unitstart{margin-left:12px}.seg[data-label]:hover:after{content:attr(data-label);position:absolute;bottom:22px;left:50%;transform:translateX(-50%);background:#2e2d2a;color:#fff;font-size:11.5px;font-weight:normal;letter-spacing:.02em;padding:5px 10px;border-radius:5px;white-space:nowrap;pointer-events:none;box-shadow:0 5px 16px rgba(0,0,0,.22);z-index:30}.counter{font-size:13px;border:1px solid #d4cec2;background:#fff;padding:6px 10px;min-width:78px;text-align:center;color:#403d38;font-variant-numeric:tabular-nums}.rightnav{display:flex;gap:9px}.navbtn .chev{opacity:.6;font-weight:normal}
@keyframes appear{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(max-width:840px){.slide{padding:24px 20px}.act-tag{display:none}.case-grid,.branch-cols{grid-template-columns:1fr}.progress{display:none}.mobilecrumb{display:block}.titlebox h1{font-size:4rem}h1.section{font-size:2.7rem}.case-title{font-size:16px}}
@media (prefers-reduced-motion:reduce){.slide,.bg-layer{transition:none!important;transform:none!important;filter:none!important}}
@media print{body{background:white}.app{height:auto;overflow:visible}.nav,.topbar{display:none}.stage,.slide{position:static;height:auto;overflow:visible}.slide{page-break-after:always;opacity:1;transform:none;filter:none}.bg-layer,.stage:after{display:none}.reveal-btn{display:none!important}.answer[hidden]{display:block!important}}
/* --- projector readability pass: larger type, with spacing reclaimed to preserve layouts --- */
@media (min-width:841px){
  .slide{padding-top:32px;padding-bottom:22px}
  .kicker{font-size:15px;margin-bottom:6px}
  .titlebox .sub,.section-sub{font-size:27px;line-height:1.42}
  .byline{font-size:18px;margin-top:18px}.hint{font-size:15px;margin-top:20px}
  .panel p{font-size:1.42rem;line-height:1.42;margin-bottom:12px}.panel .lead{font-size:1.58rem;line-height:1.38}
  li,.keylist>li{font-size:1.31rem;line-height:1.38;margin-bottom:7px}
  .subbul li{font-size:1.16rem;line-height:1.34;margin-bottom:4px}
  .qstem{font-size:1.65rem;line-height:1.34;margin-bottom:12px}
  .callout{margin-top:12px}.callout span,.pearl span,.redflag span,.formula span,.trivia span{font-size:12.5px}
  .callout p{font-size:1.24rem;line-height:1.35}
  .pearl,.redflag,.formula,.trivia{margin-top:10px;padding-top:8px;padding-bottom:8px}
  .pearl p,.redflag p,.trivia p{font-size:18px;line-height:1.34}.formula p{font-size:19px;line-height:1.38}
  .labcaption{font-size:18px;margin-bottom:8px}.labtable td{font-size:1.52rem;padding:9px 14px}
  .compare th,.compare td{font-size:1.4rem;padding:13px 30px}.tablewrap{margin-top:12px;margin-bottom:14px}
  .answer{margin-top:12px;padding-top:11px}.answer h2{font-size:35px;margin-bottom:9px}
  .answer .keylist>li{font-size:1.27rem}
  .reveal-btn{font-size:15.5px;padding:10px 20px}
  .branch-lead{font-size:21px;line-height:1.4}.branch-q{font-size:24px;margin:7px 0 10px}
  .branch-card{padding:12px 15px}.branch-card .path{font-size:13.5px}.branch-card h3{font-size:24px;margin-bottom:7px}.branch-card .tap{font-size:13px}
  .s3 .compare th,.s3 .compare td{font-size:1.18rem;padding:8px 16px}.s3 .reveal-btn{margin-top:14px}
  .focus-answer .answer p{font-size:1.5rem;line-height:1.34;margin-bottom:10px}
}
/* --- lab abnormal flags --- */
.labtable td.val{white-space:nowrap;text-align:center;font-variant-numeric:tabular-nums}
.labtable .num{font-variant-numeric:tabular-nums}
.labtable .num.hi{color:#a6402f;font-weight:bold}
.labtable .num.lo{color:#356089;font-weight:bold}
.arrow{font-size:0.62em;line-height:1;margin-left:6px;vertical-align:middle}
.arrow.hi{color:#a6402f}.arrow.lo{color:#356089}
/* --- pearls, red flags, formula --- */
.pearl,.redflag{margin-top:14px;padding:11px 15px;border-radius:2px;border-left:4px solid var(--gold);background:rgba(174,136,69,.10)}
.pearl span,.redflag span{display:block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:bold;color:var(--gold);margin-bottom:5px}
.pearl p,.redflag p{font-size:16.5px;line-height:1.44;margin:0;color:#2f2b26}
.redflag{border-left-color:var(--red);background:rgba(168,69,69,.10)}
.redflag span{color:var(--red)}
.formula{margin:14px 0;padding:11px 15px;border-radius:2px;background:rgba(255,255,255,.42);border:1px solid rgba(93,83,68,.20)}
.formula span{display:block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:bold;color:var(--chapter);margin-bottom:5px}
.formula p{margin:0;font-size:17.5px;line-height:1.5;color:#2f2b26}.formula b{color:#34345e}
/* --- key list (replaces bullet dots) --- */
.keylist{list-style:none;margin:0 0 6px;padding:0}
.keylist>li{position:relative;padding-left:22px;font-size:1.19rem;line-height:1.46;margin:0 0 10px}
.keylist>li:before{content:"";position:absolute;left:2px;top:8px;width:7px;height:7px;background:var(--chapter);transform:rotate(45deg);opacity:.9}
.keylist li b{color:#34345e}
.answer .keylist>li{font-size:1.16rem}
.hl{color:#a6402f;font-weight:bold;font-style:normal}
/* --- sub-bullets --- */
.subbul{list-style:none;margin:7px 0 2px;padding:0}
.subbul li{position:relative;padding-left:16px;font-size:1.06rem;line-height:1.4;margin:0 0 5px}
.subbul li:before{content:"";position:absolute;left:1px;top:11px;width:8px;height:1px;background:var(--muted);opacity:.75}
.subbul li b{color:#34345e}
/* --- trivia box --- */
.trivia{margin-top:14px;padding:11px 15px;border-radius:2px;border-left:4px solid #5d6e8c;background:rgba(93,110,140,.10)}
.trivia span{display:block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:bold;color:#5d6e8c;margin-bottom:5px}
.trivia p{font-size:16.5px;line-height:1.44;margin:0;color:#2f2b26}
/* --- narrow right-aligned stack (avoid art overlap) --- */
.slide.right .stack.narrow,.slide.right .stack.wide.narrow{width:min(560px,100%);max-width:560px}
/* --- slide-specific emphasis --- */
.focus-answer .qstem{font-size:clamp(2.15rem,4.2vw,3.72rem);line-height:1.08;color:#34345e;margin:0 0 24px;padding:4px 0 10px 24px;border-left:6px solid var(--chapter);text-shadow:0 1px 0 rgba(255,255,255,.88),0 0 18px rgba(250,248,241,.88),0 0 42px rgba(250,248,241,.72)}
.focus-answer .reveal-btn{font-size:15px;padding:13px 26px;box-shadow:0 5px 18px rgba(52,52,94,.18)}
.focus-answer .answer{margin-top:24px;padding:18px 22px 20px;border:1px solid rgba(52,52,94,.28);border-left:6px solid var(--chapter);border-radius:8px;background:rgba(255,255,255,.58);backdrop-filter:blur(14px) saturate(1.12);-webkit-backdrop-filter:blur(14px) saturate(1.12);box-shadow:0 14px 34px rgba(42,38,31,.16)}
.focus-answer .answer p{font-size:1.42rem;line-height:1.42;margin-bottom:13px}
.slide.right .stack.hepatocyte-stack{margin-right:clamp(22px,4vw,58px)}
.slide.right .stack.alcohol-ratio-stack{margin-right:clamp(64px,8vw,140px)}
/* --- extra-obscured background is applied per background layer in script --- */
/* --- empty-then-fill table (slide 3) --- */
.s3 .answer{display:none}
/* --- slide 3: projector-scale comparison table --- */
.stack.s3{width:min(900px,100%);max-width:900px}
.s3 .panel{width:100%;max-width:100%}
.s3col{width:100%;max-width:100%}
.s3col>h1.section{margin:0 0 18px}
.s3-title{display:block;font-size:clamp(2.15rem,3.2vw,3.15rem);line-height:1.08;white-space:nowrap}
.s3col .tablewrap{width:100%;margin:18px 0 22px;background:rgba(249,247,241,.44);border-color:rgba(75,74,120,.34);box-shadow:0 14px 38px rgba(42,38,31,.14)}
.s3col .compare{min-width:0;width:100%;table-layout:fixed}
.s3 .compare th,.s3 .compare td{padding:15px 24px;font-size:clamp(1.45rem,2vw,1.8rem);line-height:1.15}
.s3 .compare th{font-size:clamp(1.6rem,2.2vw,2rem);font-weight:bold;background:rgba(255,255,255,.58)}
.s3 .compare td{background:rgba(255,255,255,.16)}
.s3 .answer .tablewrap{width:100%;margin:16px 0}
.s3 .answer .compare{min-width:0;width:100%}
.s3 .reveal-btn{display:block;margin:22px auto 0;font-size:17px;padding:13px 26px}
.shelltable th,.shelltable td{width:50%}
.shelltable td{height:54px}
@media(max-height:760px) and (min-width:841px){.s3-title{font-size:2rem}.s3 .compare th,.s3 .compare td{padding:10px 20px;font-size:1.35rem}.shelltable td{height:42px}.s3 .reveal-btn{margin-top:14px}}
.cell-reveal{display:inline-block;opacity:0;transform:translateY(3px);animation:cellAppear .58s ease forwards;animation-delay:var(--d,0ms)}
@keyframes cellAppear{to{opacity:1;transform:none}}
/* --- clickable branch algorithm --- */
.branch{display:grid;gap:6px}
.branch-lead{font-size:19.5px;line-height:1.5;margin:0 0 2px;color:var(--muted)}
.branch-q{font-size:22px;font-weight:bold;color:#34345e;margin:10px 0 14px;line-height:1.35}
.branch-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.branch-card{background:rgba(255,255,255,.4);border:1px solid rgba(93,83,68,.2);padding:16px 18px;cursor:pointer;transition:background .15s ease,box-shadow .15s ease,transform .12s ease}
.branch-card:hover{background:rgba(255,255,255,.62);box-shadow:0 3px 12px rgba(52,52,94,.12);transform:translateY(-1px)}
.branch-card .path{font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:#6f685f;font-weight:bold;margin-bottom:6px}
.branch-card h3{margin:0 0 9px;font-size:22px;color:#34345e;font-weight:normal}
.branch-card .tap{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--chapter);font-weight:bold}
.branch-card .tap:before{content:"\25B8";margin-right:7px;font-size:11px;opacity:.85}
.branch-causes{margin-top:8px}
.branch-causes[hidden]{display:none}
.branch-card:focus-visible{outline:2px solid #34345e;outline-offset:2px}
/* --- accessibility & focus --- */
.reveal-btn:focus-visible,.navbtn:focus-visible,.seg:focus-visible,.close:focus-visible{outline:2px solid #34345e;outline-offset:2px}
.seg:focus{outline:2px solid #34345e;outline-offset:2px}
/* --- seamless swap between slides that share a lab table --- */
.case-head,.panel{transition:opacity .2s ease}
.case-head.swapping,.panel.swapping{opacity:0}
.labtable td{transition:background .3s ease}
.labtable tr.rowfocus td{background:rgba(174,136,69,.24);font-weight:bold;color:#1d1b19}
/* --- mobile position crumb --- */
.mobilecrumb{display:none;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#6f685f;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1 1 auto;min-width:0}
/* --- slide focus target (announced on navigation) --- */
.slide:focus{outline:none}
.slide:focus-visible{outline:none}
</style>
</head>
<body>

function preloadImage(src){
  if(!src) return Promise.resolve();
  if(imageLoads.has(src)) return imageLoads.get(src);
  const load = new Promise(resolve => {
    const image = new Image();
    image.decoding = "async";
    image.onload = async () => {
      try { await image.decode(); } catch(_) {}
      resolve();
    };
    image.onerror = resolve;
    image.src = src;
  });
  imageLoads.set(src, load);
  return load;
}

}

function setBg(s,c,instant=false){
  stage.style.setProperty("--bg", c.bg);

  if(key === currentBgKey && !instant) return;
  if(!instant && !reduceMotion && visualKey === currentBgVisualKey){
    currentBgKey = key;

  }
  currentBgKey = key;

  const layer = instant || reduceMotion ? activeBg : inactiveBg;
  paintBg(layer,state);

  });
}

}
function caseHtml(s){
  return `<div class="case-stack"><div class="case-head">${head(s)}</div><div class="case-grid"><div class="labcol">${labTableHtml(s)}</div><div class="panel">${panelHtml(s)}</div></div></div>`;
}
function branchHtml(s){
  const cards = s.branches.map(b => `<div class="branch-card" data-branch tabindex="0" role="button" aria-expanded="false"><div class="path">${esc(b.path)}</div><h3>${esc(b.title)}</h3><div class="tap">Tap to reveal causes</div><div class="branch-causes" hidden><ul class="keylist">${b.causes.map(c => `<li>${c}</li>`).join("")}</ul></div></div>`).join("");
  return `<div class="stack wide">${head(s)}<div class="branch"><p class="branch-lead">${s.intro}</p><p class="branch-q">${s.q}</p><div class="branch-cols">${cards}</div></div></div>`;
}
function htmlFor(s){
  if(s.type === "title" || s.type === "end") return titleHtml(s);
  if(s.type === "text") return textHtml(s);
  if(s.type === "section") return sectionHtml(s);
  if(s.type === "case") return caseHtml(s);
  if(s.type === "branch") return branchHtml(s);
  return "";
}
function fillInlineTable(){
  const shellRows = slideEl.querySelectorAll(".s3 .shelltable tr");
  const answerRows = slideEl.querySelectorAll(".s3 [data-answer] .compare tr");
  if(!shellRows.length || !answerRows.length) return false;
  answerRows.forEach((row, rowIndex) => {
    const shellCells = shellRows[rowIndex]?.querySelectorAll("td");
    const answerCells = row.querySelectorAll("td");
    if(!shellCells || !answerCells.length) return;
    answerCells.forEach((cell, cellIndex) => {
      if(shellCells[cellIndex]){
        const value = cell.innerHTML || "&nbsp;";
        const delay = Math.max(0, (rowIndex - 1) * 55 + cellIndex * 24);
        shellCells[cellIndex].innerHTML = value === "&nbsp;" ? value : `<span class="cell-reveal" style="--d:${delay}ms">${value}</span>`;
      }
    });
  });
  return true;
}
function wire(s){
  const rb = slideEl.querySelector("[data-act='reveal']");
  if(rb) rb.addEventListener("click", () => {
    const ans = slideEl.querySelector("[data-answer]");
    if(fillInlineTable()){
      rb.setAttribute("aria-expanded","true");
      rb.style.display = "none";
      s.done = true;
      updateTableBlurLayers(s);
      updateChrome();
      return;
    }
    if(ans) ans.hidden = false;
    rb.setAttribute("aria-expanded","true");
    rb.style.display = "none";
    s.done = true;
    if(s.type === "case"){
      applyStageState(s);
      setBg(s, meta(s));
    }
    updateTableBlurLayers(s);
    updateChrome();
  });
  if(s.done){
    const ans = slideEl.querySelector("[data-answer]");
    if(!fillInlineTable() && ans) ans.hidden = false;
    if(rb) rb.style.display = "none";
    updateTableBlurLayers(s);
  }
  // branch cards; open/closed state persists per slide
  const cards = slideEl.querySelectorAll("[data-branch]");
  if(cards.length && !s.branchOpen) s.branchOpen = [];
  cards.forEach((card, i) => {
    const causes = card.querySelector(".branch-causes");
    const tap = card.querySelector(".tap");
    const setOpen = open => {
      causes.hidden = !open;
      card.setAttribute("aria-expanded", String(open));
      if(tap) tap.style.display = open ? "none" : "";
    };
    if(s.branchOpen && s.branchOpen[i]) setOpen(true);
    const toggle = () => { const open = causes.hidden; if(s.branchOpen) s.branchOpen[i] = open; setOpen(open); };
    card.addEventListener("click", toggle);
    card.addEventListener("keydown", e => { if(e.key === "Enter" || e.key === " "){ e.preventDefault(); toggle(); } });
  });
}
function applyStageState(s){
  const c = meta(s);
  const hideTell = shouldHideCaseTell(s);
  const layout = new Set(String(s.layout || "left").split(/\s+/));
  actTag.textContent = hideTell ? "Diagnostic case" : c.label;
  stage.classList.remove("dx-blur","obscure-strong");
  stage.classList.toggle("scrim-right", layout.has("right"));
  stage.classList.toggle("scrim-center", layout.has("center"));
  stage.classList.toggle("scrim-left", !layout.has("right") && !layout.has("center") && !layout.has("plain"));
}
function sameTable(a,b){
  return !!a && !!b && a.type === "case" && b.type === "case" && !!a.labs && !!b.labs
    && (a.layout||"") === (b.layout||"") && a.image === b.image
    && JSON.stringify(a.labs) === JSON.stringify(b.labs);
}
function applyRowFocus(s){
  slideEl.querySelectorAll(".labtable tr").forEach(tr => {
    const cell = tr.querySelector("td");
    const name = cell ? cell.textContent.trim() : "";
    tr.classList.toggle("rowfocus", !!s.focusLab && name === s.focusLab);
  });
}
function render(direction=0){
  const s = SLIDES[idx], c = meta(s);
  applyStageState(s);
  setBg(s,c,idx === 0);
  slideEl.style.setProperty("--chapter", c.color);
  const enter = direction > 0 ? " enter-next" : direction < 0 ? " enter-prev" : "";
  slideEl.className = `slide ${s.layout || "left"}${enter}`;
  slideEl.setAttribute("aria-label", slideLabel(s));
  slideEl.innerHTML = htmlFor(s);
  slideEl.scrollTop = 0;
  wire(s);
  applyRowFocus(s);
  updateTableBlurLayers(s);
  updateChrome();
  warmNearby(idx);
  requestAnimationFrame(() => requestAnimationFrame(() => { updateTableBlurLayers(s); slideEl.classList.add("is-visible"); }));
}
function slideLabel(s){
  const raw = s.section || s.sectionHtml || s.title || s.caseNo || meta(s).label || "";
  return raw.replace(/<[^>]+>/g,"").replace(/&ldquo;|&rdquo;/g,'"').replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").trim();
}
function updateChrome(){
  counter.textContent = `${idx + 1} / ${SLIDES.length}`;
  document.getElementById("mobilecrumb").textContent = slideLabel(SLIDES[idx]);
  document.getElementById("prev").disabled = idx === 0 || isTransitioning;
  document.getElementById("next").disabled = idx === SLIDES.length - 1 || isTransitioning;
  progress.innerHTML = "";
  const gkey = (s,i) => s.caseNo || (s.type + "|" + i);
  SLIDES.forEach((s,i) => {
    const seg = document.createElement("div");
    const unitStart = i > 0 && gkey(s,i) !== gkey(SLIDES[i-1],i-1);
    seg.className = "seg" + (i <= idx ? " done" : "") + (i === idx ? " current" : "") + (unitStart ? " unitstart" : "");
    seg.style.setProperty("--segcol", meta(s).color);
    const lbl = `${i+1}. ${slideLabel(s)}`;
    seg.setAttribute("data-label", lbl);
    seg.title = lbl;
    seg.setAttribute("role","button");
    seg.setAttribute("aria-label", `Go to slide ${lbl}`);
    seg.setAttribute("aria-current", i === idx ? "true" : "false");
    seg.tabIndex = i === idx ? 0 : -1;
    seg.addEventListener("click", () => transitionTo(i, i - idx));
    seg.addEventListener("keydown", e => { if(e.key === "Enter" || e.key === " "){ e.preventDefault(); transitionTo(i, i - idx); } });
    progress.appendChild(seg);
  });
}
function softSwap(target){
  const headEl = slideEl.querySelector(".case-head");
  const panelEl = slideEl.querySelector(".panel");
  if(!headEl || !panelEl){ idx = target; render(0); slideEl.focus({preventScroll:true}); return; }
  const headChanges = head(SLIDES[target]) !== head(SLIDES[idx]);
  isTransitioning = true;
  updateChrome();
  const nextSlide = SLIDES[target];
  applyStageState(nextSlide);
  setBg(nextSlide, meta(nextSlide));
  updateTableBlurLayers(nextSlide);
  clearTimeout(timer);
  if(headChanges) headEl.classList.add("swapping");
  panelEl.classList.add("swapping");
  timer = setTimeout(() => {
    idx = target;
    const s = SLIDES[idx], c = meta(s);
    slideEl.style.setProperty("--chapter", c.color);
    slideEl.setAttribute("aria-label", slideLabel(s));
    if(headChanges) headEl.innerHTML = head(s);
    panelEl.innerHTML = panelHtml(s);
    applyStageState(s);
    setBg(s,c);
    wire(s);
    applyRowFocus(s);
    updateTableBlurLayers(s);
    requestAnimationFrame(() => { updateTableBlurLayers(s); headEl.classList.remove("swapping"); panelEl.classList.remove("swapping"); });
    isTransitioning = false;
    updateChrome();
    slideEl.focus({preventScroll:true});
  }, 200);
}
async function transitionTo(target,direction=0){
  if(isTransitioning || target === idx || target < 0 || target >= SLIDES.length) return;
  isTransitioning = true;
  updateChrome();
  const nextSlide = SLIDES[target];
  await preloadImage(nextSlide.image ? BACKGROUND_IMAGE_BASE_PATH + nextSlide.image : "");
  if(reduceMotion){ idx = target; render(direction); isTransitioning = false; updateChrome(); slideEl.focus({preventScroll:true}); return; }
  if(sameTable(SLIDES[idx], nextSlide)){ isTransitioning = false; softSwap(target); return; }
  applyStageState(nextSlide);
  setBg(nextSlide, meta(nextSlide));
  updateTableBlurLayers(nextSlide);
  clearTimeout(timer);
  slideEl.classList.remove("is-visible","enter-next","enter-prev");
  slideEl.classList.add(direction > 0 ? "leaving-next" : "leaving-prev");
  timer = setTimeout(() => {
    idx = target;
    render(direction);
    isTransitioning = false;
    updateChrome();
    slideEl.focus({preventScroll:true});
  }, SLIDE_LEAVE_MS);
}
function go(d){ transitionTo(idx + d, d); }
function resetAll(){
  SLIDES.forEach(s => { delete s.done; delete s.branchOpen; });
  idx = 0; isTransitioning = false; clearTimeout(timer); render(0);
}
document.getElementById("next").addEventListener("click", () => go(1));
document.getElementById("prev").addEventListener("click", () => go(-1));
document.getElementById("reset").addEventListener("click", resetAll);
document.getElementById("resetTop").addEventListener("click", resetAll);
window.addEventListener("resize", () => updateTableBlurLayers(SLIDES[idx]));
slideEl.addEventListener("scroll", () => updateTableBlurLayers(SLIDES[idx]), {passive:true});
document.addEventListener("keydown", e => {
  if(e.key === "ArrowRight" || e.key === "PageDown"){ go(1); e.preventDefault(); }
  if(e.key === "ArrowLeft" || e.key === "PageUp"){ go(-1); e.preventDefault(); }
  if(e.key === "Home"){ transitionTo(0, -1); e.preventDefault(); }
  if(e.key === "End"){ transitionTo(SLIDES.length - 1, 1); e.preventDefault(); }
  if((e.key === "Enter" || e.key === " ") && document.activeElement === document.body){
    const rb = slideEl.querySelector("[data-act='reveal']");
    if(rb && rb.style.display !== "none"){ rb.click(); e.preventDefault(); }
  }
});
render(0);
</script>
</body>
</html>
